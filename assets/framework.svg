<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#eef2f7"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <filter id="card" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1000" height="360" fill="url(#bg)"/>
  <rect x="32" y="20" width="936" height="52" rx="10" fill="url(#hdr)"/>
  <text x="500" y="42" text-anchor="middle" fill="#f1f5f9" font-size="17" font-weight="700" letter-spacing="-0.02em">Evidence-Bound Ontology State Engine</text>
  <text x="500" y="62" text-anchor="middle" fill="#94a3b8" font-size="12">Biomedical relation extraction under paraphrase variation | canonical graph | QA evaluation</text>

  <!-- Stage numbers + columns -->
  <g font-size="10" font-weight="700" fill="#64748b" letter-spacing="0.06em">
    <text x="118" y="98" text-anchor="middle">01 DATA</text>
    <text x="318" y="98" text-anchor="middle">02 BASELINES</text>
    <text x="518" y="98" text-anchor="middle">03 TRIPLES</text>
    <text x="718" y="98" text-anchor="middle">04 STATE ENGINE</text>
    <text x="918" y="98" text-anchor="middle">05 OUTPUTS</text>
  </g>

  <!-- 01 -->
  <g filter="url(#card)">
    <rect x="48" y="108" width="140" height="118" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.25"/>
    <rect x="48" y="108" width="140" height="6" rx="12" fill="#6366f1"/>
    <rect x="48" y="114" width="140" height="6" fill="#6366f1"/>
    <text x="118" y="138" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Inputs</text>
    <text x="118" y="158" text-anchor="middle" font-size="11" fill="#475569">Paraphrase sets</text>
    <text x="118" y="176" text-anchor="middle" font-size="11" fill="#475569">QA pairs</text>
    <text x="118" y="194" text-anchor="middle" font-size="11" fill="#475569">BC5CDR (train)</text>
    <text x="118" y="212" text-anchor="middle" font-size="10" fill="#94a3b8">optional corpus</text>
  </g>

  <!-- 02 -->
  <g filter="url(#card)">
    <rect x="228" y="108" width="180" height="118" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.25"/>
    <rect x="228" y="108" width="180" height="6" rx="12" fill="#2563eb"/>
    <rect x="228" y="114" width="180" height="6" fill="#2563eb"/>
    <text x="318" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Three baselines</text>
    <text x="248" y="158" font-size="10.5" fill="#1e40af" font-weight="600">1</text>
    <text x="262" y="158" font-size="10.5" fill="#334155">BioBERT NER + RE</text>
    <text x="248" y="176" font-size="10.5" fill="#1e40af" font-weight="600">2</text>
    <text x="262" y="176" font-size="10.5" fill="#334155">+ ontology normalization</text>
    <text x="248" y="194" font-size="10.5" fill="#1e40af" font-weight="600">3</text>
    <text x="262" y="194" font-size="10.5" fill="#334155">Qwen prompt triples</text>
    <text x="318" y="214" text-anchor="middle" font-size="10" fill="#94a3b8">per paraphrase instance</text>
  </g>

  <!-- 03 -->
  <g filter="url(#card)">
    <rect x="448" y="108" width="140" height="118" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.25"/>
    <rect x="448" y="108" width="140" height="6" rx="12" fill="#d97706"/>
    <rect x="448" y="114" width="140" height="6" fill="#d97706"/>
    <text x="518" y="142" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">Triple streams</text>
    <text x="518" y="168" text-anchor="middle" font-size="11" fill="#92400e">(subject, relation, object)</text>
    <text x="518" y="190" text-anchor="middle" font-size="10" fill="#b45309">aligned for comparison</text>
    <text x="518" y="210" text-anchor="middle" font-size="10" fill="#ca8a04">stability vs. paraphrase</text>
  </g>

  <!-- 04 -->
  <g filter="url(#card)">
    <rect x="628" y="108" width="180" height="118" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.25"/>
    <rect x="628" y="108" width="180" height="6" rx="12" fill="#059669"/>
    <rect x="628" y="114" width="180" height="6" fill="#059669"/>
    <text x="718" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#064e3b">Core engine</text>
    <text x="718" y="156" text-anchor="middle" font-size="10.5" fill="#047857">Entity canonicalization + clustering</text>
    <text x="718" y="174" text-anchor="middle" font-size="10.5" fill="#047857">Ontology alignment + merge policy</text>
    <text x="718" y="192" text-anchor="middle" font-size="10.5" fill="#047857">Evidence-bound edges (active / weak / uncertain)</text>
    <text x="718" y="212" text-anchor="middle" font-size="10" fill="#6ee7b7">GED, Jaccard, Drift@tau</text>
  </g>

  <!-- 05 -->
  <g filter="url(#card)">
    <rect x="848" y="108" width="120" height="118" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.25"/>
    <rect x="848" y="108" width="120" height="6" rx="12" fill="#7c3aed"/>
    <rect x="848" y="114" width="120" height="6" fill="#7c3aed"/>
    <text x="908" y="142" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Deliverables</text>
    <text x="908" y="166" text-anchor="middle" font-size="10.5" fill="#5b21b6">QA EM / Recall@1</text>
    <text x="908" y="186" text-anchor="middle" font-size="10.5" fill="#5b21b6">method_comparison</text>
    <text x="908" y="206" text-anchor="middle" font-size="10.5" fill="#5b21b6">HTML + graph PNG</text>
  </g>

  <!-- Arrows between stages -->
  <path d="M 188 167 L 220 167" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 408 167 L 440 167" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 588 167 L 620 167" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 808 167 L 840 167" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Bottom legend strip -->
  <rect x="48" y="252" width="904" height="86" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="68" y="278" font-size="11" font-weight="700" fill="#334155">How to run</text>
  <text x="68" y="298" font-size="10" fill="#64748b">Demo (CPU):</text>
  <text x="145" y="298" font-size="10" fill="#0f172a" font-family="ui-monospace, monospace">cd Demo &amp;&amp; python3 run_demo.py</text>
  <text x="68" y="316" font-size="10" fill="#64748b">Full pipeline:</text>
  <text x="145" y="316" font-size="10" fill="#0f172a" font-family="ui-monospace, monospace">./run_full_pipeline.sh</text>
  <text x="68" y="332" font-size="10" fill="#64748b">Train NER/RE:</text>
  <text x="145" y="332" font-size="10" fill="#0f172a" font-family="ui-monospace, monospace">cd baselines &amp;&amp; python3 train.py --help</text>
  <line x1="520" y1="260" x2="520" y2="322" stroke="#e2e8f0"/>
  <text x="540" y="278" font-size="11" font-weight="700" fill="#334155">Metrics snapshot</text>
  <text x="540" y="298" font-size="10" fill="#64748b">Graph stability: mean pairwise GED / Jaccard / fraction with high drift</text>
  <text x="540" y="316" font-size="10" fill="#64748b">Downstream QA: exact match and R@1 over merged graph</text>
  <text x="540" y="332" font-size="10" fill="#64748b">Engine flags: unsupported inferences and conflict records for audit</text>
</svg>
