<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="12">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="920" height="280" fill="url(#bg)"/>
  <text x="460" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">Evidence-bound ontology state engine - high-level pipeline</text>

  <g filter="url(#shadow)">
    <rect x="24" y="52" width="120" height="44" rx="6" fill="#fff" stroke="#64748b"/>
    <text x="84" y="78" text-anchor="middle" fill="#334155">Paraphrase sets</text>
    <rect x="160" y="52" width="100" height="44" rx="6" fill="#fff" stroke="#64748b"/>
    <text x="210" y="78" text-anchor="middle" fill="#334155">QA pairs</text>
    <rect x="276" y="52" width="130" height="44" rx="6" fill="#fff" stroke="#64748b"/>
    <text x="341" y="78" text-anchor="middle" fill="#334155">BC5CDR (optional)</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="48" width="200" height="96" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="530" y="72" text-anchor="middle" font-weight="600" fill="#1e40af">Baselines</text>
    <text x="530" y="92" text-anchor="middle" fill="#1e3a8a" font-size="11">1: BioBERT NER + RE</text>
    <text x="530" y="108" text-anchor="middle" fill="#1e3a8a" font-size="11">2: + Ontology IDs</text>
    <text x="530" y="124" text-anchor="middle" fill="#1e3a8a" font-size="11">3: Qwen prompt triples</text>
  </g>

  <path d="M 144 74 L 200 74 L 200 96 L 425 96" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#m)"/>
  <path d="M 260 74 L 400 74 L 400 88 L 425 88" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#m)"/>
  <path d="M 406 74 L 420 74 L 420 104 L 425 104" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#m)"/>

  <g filter="url(#shadow)">
    <rect x="660" y="60" width="140" height="52" rx="6" fill="#fff7ed" stroke="#ea580c"/>
    <text x="730" y="86" text-anchor="middle" font-weight="600" fill="#9a3412">Triple streams</text>
    <text x="730" y="102" text-anchor="middle" fill="#c2410c" font-size="11">per paraphrase / baseline</text>
  </g>
  <path d="M 630 96 L 655 96" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#m)"/>

  <g filter="url(#shadow)">
    <rect x="320" y="168" width="280" height="92" rx="8" fill="#f0fdf4" stroke="#16a34a"/>
    <text x="460" y="194" text-anchor="middle" font-weight="600" fill="#14532d">Evidence-bound state engine</text>
    <text x="460" y="214" text-anchor="middle" fill="#166534" font-size="11">Canonicalize, ontology align, merge graph</text>
    <text x="460" y="232" text-anchor="middle" fill="#166534" font-size="11">Unsupported / conflict handling</text>
    <text x="460" y="250" text-anchor="middle" fill="#166534" font-size="11">Stability metrics (GED, Jaccard, Drift@tau)</text>
  </g>

  <path d="M 530 144 L 530 160 L 460 160 L 460 165" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#m)"/>
  <path d="M 730 112 L 730 140 L 460 140 L 460 165" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#m)"/>

  <g filter="url(#shadow)">
    <rect x="640" y="176" width="100" height="36" rx="6" fill="#fff" stroke="#64748b"/>
    <text x="690" y="198" text-anchor="middle" fill="#334155">QA (EM / R@1)</text>
    <rect x="752" y="176" width="140" height="36" rx="6" fill="#fff" stroke="#64748b"/>
    <text x="822" y="198" text-anchor="middle" fill="#334155">Reports &amp; plots</text>
    <rect x="640" y="224" width="252" height="36" rx="6" fill="#faf5ff" stroke="#7c3aed"/>
    <text x="766" y="246" text-anchor="middle" fill="#5b21b6" font-size="11">method_comparison, HTML, PNG</text>
  </g>
  <path d="M 600 214 L 635 214" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#m)"/>
  <path d="M 600 232 L 620 232 L 620 242 L 635 242" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#m)"/>
</svg>
